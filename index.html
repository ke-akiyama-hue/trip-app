<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f1f5f9; margin: 0; padding: 10px; color: #1e293b; }
    .header { background: #0f766e; color: #fff; padding: 12px 16px; border-radius: 8px 8px 0 0; }
    .header h1 { margin: 0 0 4px 0; font-size: 1.1rem; }
    .header .user-info { font-size: 12px; opacity: 0.9; }
    .tabs { display: flex; background: #14b8a6; padding: 4px; gap: 4px; border-radius: 0 0 8px 8px; margin-bottom: 12px; }
    .tab-btn { flex: 1; border: none; background: transparent; color: #ccfbf1; padding: 10px; font-size: 13px; font-weight: bold; border-radius: 6px; cursor: pointer; }
    .tab-btn.active { background: #fff; color: #0f766e; }
    .panel { display: none; background: #fff; border-radius: 8px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .panel.active { display: block; }
    .section-title { font-size: 14px; font-weight: bold; color: #0f766e; border-left: 4px solid #14b8a6; padding-left: 8px; margin: 16px 0 10px 0; }
    .section-title:first-child { margin-top: 0; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field.full { grid-column: 1 / -1; }
    label { font-size: 12px; font-weight: bold; color: #475569; }
    input, select, textarea { padding: 8px 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; }
    textarea { min-height: 60px; }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
    .btn { border: none; padding: 12px 16px; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; }
    .btn-primary { background: #0f766e; color: #fff; flex: 1; }
    .btn-secondary { background: #64748b; color: #fff; }
    .btn-success { background: #059669; color: #fff; }
    .btn-danger { background: #dc2626; color: #fff; }
    .btn-sm { padding: 6px 10px; font-size: 12px; }
    .trip-list { display: flex; flex-direction: column; gap: 8px; }
    .trip-card { border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; cursor: pointer; }
    .trip-card:hover { background: #f8fafc; }
    .status-badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
    .status-下書き { background: #e2e8f0; color: #475569; }
    .status-申請中 { background: #dbeafe; color: #1d4ed8; }
    .status-承認済 { background: #d1fae5; color: #065f46; }
    .status-差戻し { background: #fee2e2; color: #991b1b; }
    .status-取消 { background: #f1f5f9; color: #64748b; }
    .settle-未精算 { background: #fef3c7; color: #92400e; }
    .settle-精算中 { background: #dbeafe; color: #1d4ed8; }
    .settle-精算完了 { background: #ede9fe; color: #5b21b6; }
    .loading { position: fixed; inset: 0; background: rgba(255,255,255,0.85); display: flex; align-items: center; justify-content: center; font-weight: bold; color: #0f766e; z-index: 100; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: 12px 20px; border-radius: 8px; z-index: 200; display: none; max-width: 90%; }
    .toast.error { background: #dc2626; }
    .toast.success { background: #059669; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 150; align-items: center; justify-content: center; padding: 16px; }
    .modal-overlay.show { display: flex; }
    .modal { background: #fff; border-radius: 8px; padding: 20px; width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto; }
    .empty-msg { text-align: center; color: #94a3b8; padding: 24px; }
    .badge-count { background: #ef4444; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 10px; margin-left: 4px; }
    .hint { font-size: 12px; color: #64748b; margin-bottom: 8px; }
    .submit-warning { font-size: 12px; color: #92400e; background: #fffbeb; padding: 10px 12px; border-radius: 6px; border: 1px solid #fcd34d; margin-bottom: 10px; white-space: pre-wrap; }
    .route-preview { background: #f0fdfa; border: 1px solid #99f6e4; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
    .route-preview.loading { color: #64748b; font-size: 12px; background: #f8fafc; border-color: #e2e8f0; }
    .route-preview-error { background: #fffbeb; border-color: #fcd34d; color: #92400e; font-size: 12px; }
    .route-step { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px dashed #ccfbf1; font-size: 13px; }
    .route-step:last-child { border-bottom: none; padding-bottom: 0; }
    .route-step-no { flex-shrink: 0; width: 22px; height: 22px; background: #0f766e; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; }
    .route-step-body { flex: 1; min-width: 0; }
    .route-step-role { font-size: 11px; color: #64748b; margin-bottom: 2px; }
    .route-step-name { font-weight: bold; color: #0f766e; word-break: break-word; }
  </style>
</head>
<body>
<div id="loading" class="loading">読み込み中...</div>
<div id="toast" class="toast"></div>

<div class="header">
  <h1>出張申請</h1>
  <div class="user-info" id="userInfo">-</div>
</div>

<div class="tabs">
  <button class="tab-btn active" data-tab="form">新規申請</button>
  <button class="tab-btn" data-tab="list">申請一覧</button>
  <button class="tab-btn" data-tab="approval" id="tabApproval">承認待ち<span class="badge-count" id="pendingCount" style="display:none">0</span></button>
</div>

<div id="panel-form" class="panel active">
  <p class="hint">出張前に申請・承認を行います。承認後、出張旅費精算アプリで精算できます。</p>
  <div id="submitWarning" class="submit-warning" style="display:none"></div>
  <div class="section-title">出張内容</div>
  <div class="form-grid" id="routeField" style="display:none">
    <div class="field full"><label>申請経路</label>
      <select id="routeId"></select>
    </div>
  </div>
  <div id="routePreviewSection" style="display:none">
    <div class="section-title">承認ルート（予定）</div>
    <div id="routePreview" class="route-preview loading">承認者を確認中...</div>
  </div>
  <div class="form-grid">
    <div class="field"><label>出張開始日</label><input type="date" id="tripStart"></div>
    <div class="field"><label>出張終了日</label><input type="date" id="tripEnd"></div>
    <div class="field full"><label>出張先</label><input type="text" id="destination" placeholder="例：大阪市"></div>
    <div class="field full"><label>出張目的</label><input type="text" id="purpose" placeholder="例：取引先訪問"></div>
    <div class="field"><label>交通手段</label><input type="text" id="transport" placeholder="例：新幹線・レンタカー"></div>
    <div class="field"><label>宿泊予定</label><select id="lodgingPlan"><option value="">選択</option><option>日帰り</option><option>1泊</option><option>2泊</option><option>3泊以上</option></select></div>
    <div class="field"><label>概算費用（円）</label><input type="number" id="estimatedCost" min="0" placeholder="0"></div>
    <div class="field full"><label>備考</label><textarea id="note"></textarea></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-secondary" onclick="saveDraft()">下書き保存</button>
    <button class="btn btn-primary" onclick="submitTrip()">申請する</button>
    <button class="btn btn-danger btn-sm" id="btnDelete" style="display:none" onclick="deleteTrip()">下書き削除</button>
  </div>
  <input type="hidden" id="editTripId" value="">
</div>

<div id="panel-list" class="panel"><div class="section-title">自分の出張申請</div><div id="myTripList" class="trip-list"></div></div>
<div id="panel-approval" class="panel"><div class="section-title">承認待ち</div><div id="pendingList" class="trip-list"></div></div>

<div id="detailModal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3 id="modalTitle">詳細</h3>
    <div id="modalBody"></div>
    <div class="btn-row" id="modalActions"></div>
    <button class="btn btn-secondary" style="width:100%" onclick="closeModal()">閉じる</button>
  </div>
</div>

<script>
  var appData = null, currentTrip = null, lastRoutePreview = null;

  document.addEventListener('DOMContentLoaded', function() {
    google.script.run.withSuccessHandler(onInit).withFailureHandler(onError).getInitialAppData();
  });

  function onInit(data) {
    appData = data;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('userInfo').textContent = (data.employee ? data.employee.name + ' / ' : '') + (data.userEmail || '');
    updatePendingBadge(data.pendingApprovals.length);
    renderMyTrips(data.myTrips);
    renderPending(data.pendingApprovals);
    bindTabs();
    var today = new Date().toISOString().slice(0, 10);
    document.getElementById('tripStart').value = today;
    document.getElementById('tripEnd').value = today;
    setupWorkflowRoutes(data.workflowRoutes, data.workflowLinked);
    showSubmitReadiness(data.submitReadiness);
    refreshRoutePreview();
  }

  function showSubmitReadiness(readiness) {
    var el = document.getElementById('submitWarning');
    if (!readiness || readiness.ok) {
      el.style.display = 'none';
      el.textContent = '';
      return;
    }
    el.style.display = 'block';
    el.textContent = '申請前に確認: ' + readiness.message;
  }

  function setupWorkflowRoutes(routes, linked) {
    var field = document.getElementById('routeField');
    var sel = document.getElementById('routeId');
    if (!linked || !routes || !routes.length) {
      field.style.display = 'none';
      sel.innerHTML = '';
      document.getElementById('routePreviewSection').style.display = 'none';
      return;
    }
    field.style.display = '';
    sel.innerHTML = routes.map(function(r) {
      return '<option value="' + esc(r.routeId) + '">' + esc(r.routeName) +
        '（' + r.stepCount + '段階' + (r.isDefault ? '・標準' : '') + '）</option>';
    }).join('');
    sel.onchange = refreshRoutePreview;
  }

  function renderRoutePreviewHtml(res) {
    if (!res || !res.success || !res.steps || !res.steps.length) return '';
    var title = res.routeName
      ? '<div style="font-size:12px;color:#64748b;margin-bottom:8px">' + esc(res.routeName) + '</div>'
      : '';
    return title + res.steps.map(function(s) {
      return '<div class="route-step">' +
        '<div class="route-step-no">' + s.stepNo + '</div>' +
        '<div class="route-step-body">' +
          '<div class="route-step-role">' + esc(s.approvalRole) + (s.stepName ? ' · ' + esc(s.stepName) : '') + '</div>' +
          '<div class="route-step-name">' + esc(s.approverDisplay) +
          (s.approverCount > 1 ? ' <span style="font-weight:normal;font-size:11px">（' + s.approverCount + '名）</span>' : '') +
          '</div></div></div>';
    }).join('');
  }

  function refreshRoutePreview(applicantEmail) {
    var section = document.getElementById('routePreviewSection');
    var el = document.getElementById('routePreview');
    if (!appData || !appData.workflowLinked) {
      section.style.display = 'none';
      lastRoutePreview = null;
      return;
    }
    section.style.display = 'block';
    el.className = 'route-preview loading';
    el.textContent = '承認者を確認中...';

    var routeId = '';
    var sel = document.getElementById('routeId');
    if (sel && sel.value) routeId = sel.value;

    google.script.run.withSuccessHandler(function(res) {
      lastRoutePreview = res;
      if (!res.success) {
        el.className = 'route-preview route-preview-error';
        el.textContent = res.message;
        return;
      }
      el.className = 'route-preview';
      el.innerHTML = renderRoutePreviewHtml(res);
    }).withFailureHandler(onError).previewTripWorkflowRouteApi(routeId, applicantEmail || '');
  }

  function bindTabs() {
    document.querySelectorAll('.tab-btn').forEach(function(btn) {
      btn.onclick = function() {
        var tab = btn.getAttribute('data-tab');
        document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
        document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
        btn.classList.add('active');
        document.getElementById('panel-' + tab).classList.add('active');
      };
    });
  }

  function collectPayload() {
    var payload = {
      tripRequestId: document.getElementById('editTripId').value,
      tripStart: document.getElementById('tripStart').value,
      tripEnd: document.getElementById('tripEnd').value,
      destination: document.getElementById('destination').value,
      purpose: document.getElementById('purpose').value,
      transport: document.getElementById('transport').value,
      lodgingPlan: document.getElementById('lodgingPlan').value,
      estimatedCost: parseInt(document.getElementById('estimatedCost').value, 10) || 0,
      note: document.getElementById('note').value
    };
    var routeEl = document.getElementById('routeId');
    if (routeEl && routeEl.value) payload.routeId = routeEl.value;
    return payload;
  }

  function saveDraft() {
    showLoading(true);
    google.script.run.withSuccessHandler(onSave).withFailureHandler(onError).saveTripRequest(collectPayload(), false);
  }
  function submitTrip() {
    var msg = '出張申請を提出しますか？';
    if (lastRoutePreview && lastRoutePreview.success && lastRoutePreview.steps.length) {
      msg += '\n\n【承認ルート】';
      lastRoutePreview.steps.forEach(function(s) {
        msg += '\n' + s.stepNo + '. ' + s.approvalRole + '：' + s.approverDisplay;
      });
    }
    if (!confirm(msg)) return;
    showLoading(true);
    google.script.run.withSuccessHandler(onSave).withFailureHandler(onError).saveTripRequest(collectPayload(), true);
  }
  function onSave(res) {
    showLoading(false);
    if (!res.success) { toast(res.message, true); return; }
    toast(res.message, false, true);
    document.getElementById('editTripId').value = res.tripRequestId;
    document.getElementById('btnDelete').style.display = res.trip.status === '下書き' ? '' : 'none';
    refresh();
    if (res.trip.status === '申請中') resetForm();
  }

  function deleteTrip() {
    var id = document.getElementById('editTripId').value;
    if (!id || ! confirm('削除しますか？')) return;
    showLoading(true);
    google.script.run.withSuccessHandler(function(res) {
      showLoading(false);
      if (!res.success) { toast(res.message, true); return; }
      toast(res.message, false, true);
      resetForm();
      refresh();
    }).withFailureHandler(onError).deleteTripRequest(id);
  }

  function resetForm() {
    document.getElementById('editTripId').value = '';
    ['destination','purpose','transport','estimatedCost','note'].forEach(function(id) { document.getElementById(id).value = ''; });
    document.getElementById('lodgingPlan').value = '';
    document.getElementById('btnDelete').style.display = 'none';
    var today = new Date().toISOString().slice(0, 10);
    document.getElementById('tripStart').value = today;
    document.getElementById('tripEnd').value = today;
    refreshRoutePreview();
  }

  function refresh() {
    google.script.run.withSuccessHandler(function(data) {
      appData = data;
      renderMyTrips(data.myTrips);
      renderPending(data.pendingApprovals);
      updatePendingBadge(data.pendingApprovals.length);
      showSubmitReadiness(data.submitReadiness);
      refreshRoutePreview();
    }).getInitialAppData();
  }

  function renderMyTrips(trips) {
    var el = document.getElementById('myTripList');
    if (!trips || !trips.length) { el.innerHTML = '<div class="empty-msg">申請がありません</div>'; return; }
    el.innerHTML = trips.map(tripCard).join('');
    el.querySelectorAll('.trip-card').forEach(function(c) {
      c.onclick = function() { openTrip(c.getAttribute('data-id'), 'mine'); };
    });
  }
  function renderPending(trips) {
    var el = document.getElementById('pendingList');
    if (!trips || !trips.length) { el.innerHTML = '<div class="empty-msg">承認待ちはありません</div>'; return; }
    el.innerHTML = trips.map(tripCard).join('');
    el.querySelectorAll('.trip-card').forEach(function(c) {
      c.onclick = function() { openTrip(c.getAttribute('data-id'), 'approval'); };
    });
  }

  function tripCard(t) {
    return '<div class="trip-card" data-id="' + esc(t.tripRequestId) + '">' +
      '<div><strong>' + esc(t.destination) + '</strong> ' +
      '<span class="status-badge status-' + esc(t.status) + '">' + esc(t.status) + '</span> ' +
      '<span class="status-badge settle-' + esc(t.settlementStatus) + '">' + esc(t.settlementStatus) + '</span></div>' +
      '<div style="font-size:12px;color:#64748b;margin-top:4px">' + esc(t.tripRequestId) + ' / ' + esc(t.tripStart) + '〜' + esc(t.tripEnd) +
      (t.totalSteps > 1 && t.status === '申請中' ? ' / 承認' + t.currentStep + '/' + t.totalSteps : '') + '</div></div>';
  }

  function openTrip(id, mode) {
    showLoading(true);
    google.script.run.withSuccessHandler(function(res) {
      showLoading(false);
      if (!res.success) { toast(res.message, true); return; }
      currentTrip = res.trip;
      if (mode === 'mine' && (res.trip.status === '下書き' || res.trip.status === '差戻し')) {
        loadToForm(res.trip);
        switchTab('form');
      } else {
        showModal(res.trip, mode);
      }
    }).withFailureHandler(onError).getTripRequestDetail(id);
  }

  function loadToForm(t) {
    document.getElementById('editTripId').value = t.tripRequestId;
    document.getElementById('tripStart').value = t.tripStart;
    document.getElementById('tripEnd').value = t.tripEnd;
    document.getElementById('destination').value = t.destination;
    document.getElementById('purpose').value = t.purpose;
    document.getElementById('transport').value = t.transport;
    document.getElementById('lodgingPlan').value = t.lodgingPlan;
    document.getElementById('estimatedCost').value = t.estimatedCost || '';
    document.getElementById('note').value = t.note;
    if (t.routeId && document.getElementById('routeId')) document.getElementById('routeId').value = t.routeId;
    document.getElementById('btnDelete').style.display = t.status === '下書き' ? '' : 'none';
    refreshRoutePreview(t.applicantEmail);
  }

  function showModal(t, mode) {
    document.getElementById('modalTitle').textContent = t.tripRequestId;
    document.getElementById('modalBody').innerHTML =
      '<p><strong>期間：</strong>' + esc(t.tripStart) + ' 〜 ' + esc(t.tripEnd) + '</p>' +
      '<p><strong>出張先：</strong>' + esc(t.destination) + '</p>' +
      '<p><strong>目的：</strong>' + esc(t.purpose) + '</p>' +
      '<p><strong>交通：</strong>' + esc(t.transport) + ' / <strong>宿泊：</strong>' + esc(t.lodgingPlan) + '</p>' +
      '<p><strong>概算：</strong>' + (t.estimatedCost || 0).toLocaleString() + ' 円</p>' +
      (t.totalSteps > 1 ? '<p><strong>承認進捗：</strong>' + esc(t.currentStepName || '') +
        (t.currentApprovalRole ? '（' + esc(t.currentApprovalRole) + '）' : '') +
        ' ' + t.currentStep + '/' + t.totalSteps + '</p>' : '') +
      '<p><strong>精算：</strong>' + esc(t.settlementStatus) + (t.expenseClaimId ? ' (' + esc(t.expenseClaimId) + ')' : '') + '</p>' +
      '<div id="modalRoutePreviewWrap" style="display:none;margin-top:12px">' +
        '<div class="section-title" style="margin-top:0">承認ルート</div>' +
        '<div id="modalRoutePreview" class="route-preview loading">確認中...</div></div>';
    if (t.routeId && appData && appData.workflowLinked) {
      document.getElementById('modalRoutePreviewWrap').style.display = 'block';
      google.script.run.withSuccessHandler(function(res) {
        var el = document.getElementById('modalRoutePreview');
        if (!el) return;
        if (!res.success) {
          el.className = 'route-preview route-preview-error';
          el.textContent = res.message;
          return;
        }
        el.className = 'route-preview';
        el.innerHTML = renderRoutePreviewHtml(res);
      }).withFailureHandler(function() {
        var el = document.getElementById('modalRoutePreview');
        if (el) el.style.display = 'none';
      }).previewTripWorkflowRouteApi(t.routeId, t.applicantEmail);
    }
    var actions = document.getElementById('modalActions');
    actions.innerHTML = '';
    if (mode === 'approval' && t.status === '申請中') {
      actions.innerHTML = '<button class="btn btn-success" style="flex:1" onclick="doApprove()">承認</button>' +
        '<button class="btn btn-danger" style="flex:1" onclick="doReject()">差戻し</button>';
    }
    if (mode === 'mine' && t.status === '承認済' && t.settlementStatus === '未精算') {
      actions.innerHTML = '<button class="btn btn-danger" style="flex:1" onclick="doCancel()">取消</button>';
    }
    document.getElementById('detailModal').classList.add('show');
  }

  function closeModal() { document.getElementById('detailModal').classList.remove('show'); currentTrip = null; }
  function doApprove() {
    if (!currentTrip || ! confirm('承認しますか？')) return;
    showLoading(true);
    google.script.run.withSuccessHandler(function(res) { showLoading(false); closeModal(); toast(res.message, !res.success, res.success); refresh(); })
      .withFailureHandler(onError).approveTripRequest(currentTrip.tripRequestId, '');
  }
  function doReject() {
    if (!currentTrip) return;
    var reason = prompt('差戻し理由');
    if (!reason) return;
    var targetChoice = '';
    if (currentTrip.currentRejectTarget === '差戻し時に選択') {
      targetChoice = prompt('差戻し先を選択してください\n・申請者\n・ひとつ前の決裁者', '申請者');
      if (!targetChoice) return;
    }
    showLoading(true);
    google.script.run.withSuccessHandler(function(res) { showLoading(false); closeModal(); toast(res.message, !res.success, res.success); refresh(); })
      .withFailureHandler(onError).rejectTripRequest(currentTrip.tripRequestId, reason, targetChoice);
  }
  function doCancel() {
    if (!currentTrip || ! confirm('取消しますか？')) return;
    showLoading(true);
    google.script.run.withSuccessHandler(function(res) { showLoading(false); closeModal(); toast(res.message, !res.success, res.success); refresh(); })
      .withFailureHandler(onError).cancelTripRequest(currentTrip.tripRequestId);
  }

  function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.toggle('active', b.getAttribute('data-tab') === name); });
    document.querySelectorAll('.panel').forEach(function(p) { p.classList.toggle('active', p.id === 'panel-' + name); });
  }
  function updatePendingBadge(n) {
    var el = document.getElementById('pendingCount');
    el.style.display = n > 0 ? '' : 'none';
    el.textContent = n;
  }
  function showLoading(s) { document.getElementById('loading').style.display = s ? 'flex' : 'none'; }
  function toast(msg, err, ok) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast' + (err ? ' error' : ok ? ' success' : '');
    el.style.display = 'block';
    setTimeout(function() { el.style.display = 'none'; }, 4000);
  }
  function onError(e) { showLoading(false); toast('エラー: ' + (e.message || e), true); }
  function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
